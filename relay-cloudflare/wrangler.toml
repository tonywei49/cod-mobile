name = "gogodex-relay"
main = "src/worker.js"
compatibility_date = "2026-05-13"
routes = [
  { pattern = "codex.gotradetalk.com/*", zone_name = "gotradetalk.com" }
]

[[durable_objects.bindings]]
name = "RELAY_SESSION"
class_name = "RelaySession"

[[durable_objects.bindings]]
name = "RELAY_REGISTRY"
class_name = "RelayRegistry"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RelaySession", "RelayRegistry"]

[vars]
EXPOSE_DETAILED_HEALTH = "false"
